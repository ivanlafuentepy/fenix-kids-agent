# Configuración del negocio — FENIX KIDS ACADEMY
negocio:
  nombre: "FENIX KIDS ACADEMY"
  descripcion: >
    Centro de entrenamiento funcional y emocional para niños de 4 a 12 años.
    Entrenamiento al aire libre usando retos reales (trepar, correr, equilibrio)
    para generar cambios internos: autoestima, carácter y seguridad.
    Ubicado en el PARQUE FENIX dentro de LA CASONA LAFUENTE, Asunción, Paraguay.
  direccion: "Maestras Paraguayas 2056, Asunción"
